type: order_cards
visible: false
header: MSE Gradient for Linear Regression
text: |
  Order the cards to derive the gradient of mean squared error for
  linear regression in matrix form.
shuffle: true
score: 1
quiz:
  variants:
    - text: >
        Differentiate term by term with respect to $w$.


        The target-only term $y^T y$ does not depend on $w$, and $X^T X$ is
        symmetric:


        $$\nabla_w L(w) = \frac{1}{n}\left(2X^T Xw - 2X^T y\right)$$
    - text: |
        Factor the common terms:

        $$\nabla_w L(w) = \frac{2}{n}X^T(Xw - y)$$
    - text: >
        Expand the product while remembering that the middle terms are scalars:


        $$L(w) = \frac{1}{n}\left(w^T X^T Xw - w^T X^T y - y^T Xw + y^T
        y\right)$$
    - text: |
        Substitute the residual definition into the quadratic form:

        $$L(w) = \frac{1}{n}(Xw - y)^T(Xw - y)$$
    - text: >
        The mean squared error can be written compactly through the residual
        vector $r = Xw - y$:


        $$L(w) = \frac{1}{n}\|Xw - y\|_2^2 = \frac{1}{n}r^T r$$
    - text: >
        The final expression has shape $\mathbb{R}^d$, matching the weight
        vector. Geometrically, $X^T$ maps prediction errors back into feature
        coordinates, telling each weight how it should change.


        As you can see, the covariance matrix $X^T X$ plays an important role
        here.
    - text: >
        Consider a linear regression model for $n$ samples and $d$ features.


        The design matrix is $X \in \mathbb{R}^{n \times d}$, the weight vector
        is $w \in \mathbb{R}^{d}$, and the targets are $y \in \mathbb{R}^{n}$.


        Predictions are collected into one vector:


        $$\hat y = Xw$$
    - text: |
        Since $w^T X^T y$ and $y^T Xw$ are the same scalar, combine them:

        $$L(w) = \frac{1}{n}\left(w^T X^T Xw - 2w^T X^T y + y^T y\right)$$
